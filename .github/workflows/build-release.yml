name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  # ══════════════════════════════════════════════════════════
  #  WINDOWS — PyInstaller .exe + instalador Inno Setup
  # ══════════════════════════════════════════════════════════
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade PyQt6 PyQt6-WebEngine pyinstaller supabase openpyxl Pillow

      - name: Generar icono si falta
        shell: pwsh
        run: |
          if (!(Test-Path "assets\AppIcon.ico")) { python make_AppIcon_win.py }

      - name: Compilar .exe con PyInstaller
        run: python -m PyInstaller PAEControl_win.spec --clean --noconfirm

      - name: Verificar .exe generado
        shell: pwsh
        run: |
          if (!(Test-Path "dist\PAEControl.exe")) { throw "No se generó dist\PAEControl.exe" }

      - name: Compilar instalador (Inno Setup)
        shell: pwsh
        continue-on-error: true
        run: |
          # PAEControl_Setup.iss ya no depende de ningún asset bundleado
          # (compiler:...) de la instalación de Inno Setup, así que basta
          # con el ISCC.exe que venga preinstalado en el runner; si no está,
          # se instala rápido vía choco.
          $isccPath = (Get-Command ISCC.exe -ErrorAction SilentlyContinue).Source
          if (-not $isccPath) {
            $isccPath = Get-ChildItem -Path "C:\Program Files*\Inno Setup*\ISCC.exe" -ErrorAction SilentlyContinue |
                        Select-Object -First 1 -ExpandProperty FullName
          }
          if (-not $isccPath) {
            choco install innosetup -y --no-progress
            $isccPath = Get-ChildItem -Path "C:\Program Files*\Inno Setup*\ISCC.exe" -ErrorAction SilentlyContinue |
                        Select-Object -First 1 -ExpandProperty FullName
          }

          if ($isccPath) {
            Write-Host "Usando ISCC en: $isccPath"
            & $isccPath "PAEControl_Setup.iss"
          } else {
            Write-Host "Inno Setup no disponible — se omite el instalador, queda el .exe portable"
          }

      - name: Preparar artefacto Windows
        shell: pwsh
        run: |
          # dist/ y dist_installer/ son árboles de directorios distintos —
          # si se suben ambos paths tal cual, upload-artifact calcula el
          # ancestro común (la raíz del repo) y preserva esa estructura
          # anidada dentro del artefacto, así que el glob plano
          # "release-files/*" del job de publish no los encuentra. Se
          # copian ambos a un directorio único para que el artefacto
          # quede siempre plano.
          New-Item -ItemType Directory -Force -Path release_staging | Out-Null
          Copy-Item "dist\PAEControl.exe" "release_staging\" -ErrorAction SilentlyContinue
          if (Test-Path "dist_installer") {
            Copy-Item "dist_installer\*.exe" "release_staging\" -ErrorAction SilentlyContinue
          }

      - name: Subir artefacto Windows
        uses: actions/upload-artifact@v4
        with:
          name: PAEControl-windows
          path: release_staging/*
          retention-days: 90
          if-no-files-found: warn

  # ══════════════════════════════════════════════════════════
  #  macOS — PyInstaller .app + .dmg
  # ══════════════════════════════════════════════════════════
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install --upgrade pyinstaller
          # Qt PINNEADO a 6.9.1 — ver comentario en BUILD_MAC.command:
          # Qt >= 6.10 en macOS crashea (CFBundleGetBundleWithIdentifier)
          # con los install names planos que deja PyInstaller.
          python3 -m pip install "PyQt6==6.9.1" "PyQt6-Qt6==6.9.1"
          python3 -m pip install --upgrade supabase openpyxl Pillow

      - name: Generar icono si falta
        run: |
          if [ ! -f "assets/AppIcon.icns" ]; then python3 make_icon.py; fi

      - name: Compilar .app con PyInstaller
        run: python3 -m PyInstaller PAEControl.spec --clean --noconfirm

      - name: Verificar .app generado
        run: |
          if [ ! -d "dist/PAE Control.app" ]; then
            echo "No se generó dist/PAE Control.app"; exit 1
          fi

      - name: Corregir install names de Qt (fix crash CFBundleCopyBundleURL)
        run: |
          # PyInstaller copia cada librería Qt DOS veces: una copia plana en
          # Frameworks/QtCore (sin estructura de framework) y la copia
          # original con estructura correcta en
          # Frameworks/PyQt6/Qt6/lib/QtCore.framework/Versions/A/QtCore
          # (con su Info.plist, CFBundleIdentifier, etc.). El rpath de
          # QtCore.abi3.so resuelve @rpath/QtCore contra la copia plana,
          # así que en macOS Qt intenta ubicar su propio bundle vía
          # CFBundleGetBundleWithIdentifier("org.qt-project.QtCore") al
          # inicializar (warmUpLocationServices), y como la copia plana no
          # es un bundle real, CFBundleCopyBundleURL devuelve NULL y
          # crashea (EXC_BAD_ACCESS en 0x8) apenas se abre la app.
          # Fix: reemplazar cada copia plana por un symlink a la copia con
          # estructura real de framework, para que dyld cargue el binario
          # desde una ruta que CFBundle sí reconoce como bundle válido.
          cd "dist/PAE Control.app/Contents/Frameworks"
          for lib in QtCore QtGui QtWidgets QtNetwork QtSvg QtPdf QtDBus; do
            real="PyQt6/Qt6/lib/${lib}.framework/Versions/A/${lib}"
            if [ -f "$real" ] && [ -f "$lib" ] && [ ! -L "$lib" ]; then
              rm "$lib"
              ln -s "$real" "$lib"
              echo "OK  symlink $lib -> $real"
            fi
          done

      - name: Firmar app (ad-hoc)
        run: codesign --force --deep --sign - "dist/PAE Control.app" || echo "WARN codesign falló"

      - name: Empaquetar .app en .zip
        run: ditto -c -k --sequesterRsrc --keepParent "dist/PAE Control.app" "dist/PAEControl_mac.zip"

      - name: Crear .dmg
        continue-on-error: true
        run: |
          # cp -r (sin -P) en macOS SIGUE symlinks y los reemplaza por
          # copias reales — deshace el fix de "Corregir install names de
          # Qt" de arriba (que reemplaza las copias planas de Qt por
          # symlinks a la copia con estructura de framework correcta).
          # Con -P se preservan los symlinks tal cual, que es lo que
          # necesita el .dmg para no reintroducir el crash de arranque.
          # Confirmado: hdiutil create sí preserva symlinks correctamente,
          # cp -r es el único paso que los rompía.
          DMG_DIR="dist/dmg_tmp"
          rm -rf "$DMG_DIR"; mkdir -p "$DMG_DIR"
          cp -rP "dist/PAE Control.app" "$DMG_DIR/"
          ln -s /Applications "$DMG_DIR/Applications"
          hdiutil create -volname "PAE Control" -srcfolder "$DMG_DIR" \
            -ov -format UDZO -o "dist/PAEControl_mac.dmg"
          rm -rf "$DMG_DIR"

      - name: Subir artefacto macOS
        uses: actions/upload-artifact@v4
        with:
          name: PAEControl-macos
          path: |
            dist/PAEControl_mac.zip
            dist/PAEControl_mac.dmg
          retention-days: 90
          if-no-files-found: warn

  # ══════════════════════════════════════════════════════════
  #  PUBLICAR — un solo release "latest" con ambas plataformas
  # ══════════════════════════════════════════════════════════
  publish:
    needs: [build-windows, build-macos]
    if: always() && (needs.build-windows.result == 'success' || needs.build-macos.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-files
          merge-multiple: true

      - name: Publicar Release "latest"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "PAE Control — build más reciente"
          body: |
            Build automático generado desde el commit ${{ github.sha }} en `main`.

            **Windows**
            - `PAEControl.exe` → versión portable, se ejecuta directo sin instalar.
            - `PAEControl_Setup_*.exe` (si está presente) → instalador con acceso directo
              en Escritorio e Inicio. Requiere Windows 10 (64-bit) 1809+.

            **macOS**
            - `PAEControl_mac.dmg` → arrastra a Aplicaciones.
            - `PAEControl_mac.zip` → alternativa si el .dmg no está disponible en esta build.

            Ninguna requiere Python instalado.
          make_latest: true
          fail_on_unmatched_files: false
          files: release-files/*
