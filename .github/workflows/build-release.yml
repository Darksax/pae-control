name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  # ══════════════════════════════════════════════════════════
  #  WINDOWS — PyInstaller .exe + instalador Inno Setup
  # ══════════════════════════════════════════════════════════
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade PyQt6 PyQt6-WebEngine pyinstaller supabase openpyxl Pillow

      - name: Generar icono si falta
        shell: pwsh
        run: |
          if (!(Test-Path "assets\AppIcon.ico")) { python make_AppIcon_win.py }

      - name: Compilar .exe con PyInstaller
        run: python -m PyInstaller PAEControl_win.spec --clean --noconfirm

      - name: Verificar .exe generado
        shell: pwsh
        run: |
          if (!(Test-Path "dist\PAEControl.exe")) { throw "No se generó dist\PAEControl.exe" }

      - name: Compilar instalador (Inno Setup)
        shell: pwsh
        continue-on-error: true
        run: |
          # Tanto el ISCC.exe preinstalado en PATH (shim de Chocolatey) como
          # una reinstalación forzada vía "choco install innosetup" resultan
          # en una instalación parcial: falta wizmodernimage-is.bmp y
          # probablemente el paquete de idioma español (ambos son assets
          # compiler:... que el .iss necesita). El paquete choco de la
          # comunidad no los incluye. Bajamos el instalador oficial de
          # jrsoftware.org directo, que sí trae todos los archivos.
          $installerPath = "$env:TEMP\innosetup-installer.exe"
          Invoke-WebRequest -Uri "https://jrsoftware.org/download.php/is.exe" -OutFile $installerPath -UseBasicParsing
          Start-Process -FilePath $installerPath -ArgumentList "/VERYSILENT","/SUPPRESSMSGBOXES","/NORESTART","/SP-" -Wait

          $isccPath = Get-ChildItem -Path "C:\Program Files*\Inno Setup*\ISCC.exe" -ErrorAction SilentlyContinue |
                      Select-Object -First 1 -ExpandProperty FullName

          if ($isccPath) {
            Write-Host "Usando ISCC en: $isccPath"
            & $isccPath "PAEControl_Setup.iss"
          } else {
            Write-Host "Inno Setup no disponible — se omite el instalador, queda el .exe portable"
          }

      - name: Subir artefacto Windows
        uses: actions/upload-artifact@v4
        with:
          name: PAEControl-windows
          path: |
            dist/PAEControl.exe
            dist_installer/*.exe
          retention-days: 90
          if-no-files-found: warn

  # ══════════════════════════════════════════════════════════
  #  macOS — PyInstaller .app + .dmg
  # ══════════════════════════════════════════════════════════
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install --upgrade pyinstaller
          # Qt PINNEADO a 6.9.1 — ver comentario en BUILD_MAC.command:
          # Qt >= 6.10 en macOS crashea (CFBundleGetBundleWithIdentifier)
          # con los install names planos que deja PyInstaller.
          python3 -m pip install "PyQt6==6.9.1" "PyQt6-Qt6==6.9.1"
          python3 -m pip install --upgrade supabase openpyxl Pillow

      - name: Generar icono si falta
        run: |
          if [ ! -f "assets/AppIcon.icns" ]; then python3 make_icon.py; fi

      - name: Compilar .app con PyInstaller
        run: python3 -m PyInstaller PAEControl.spec --clean --noconfirm

      - name: Verificar .app generado
        run: |
          if [ ! -d "dist/PAE Control.app" ]; then
            echo "No se generó dist/PAE Control.app"; exit 1
          fi

      - name: Firmar app (ad-hoc)
        run: codesign --force --deep --sign - "dist/PAE Control.app" || echo "WARN codesign falló"

      - name: Empaquetar .app en .zip
        run: ditto -c -k --sequesterRsrc --keepParent "dist/PAE Control.app" "dist/PAEControl_mac.zip"

      - name: Crear .dmg
        continue-on-error: true
        run: |
          DMG_DIR="dist/dmg_tmp"
          rm -rf "$DMG_DIR"; mkdir -p "$DMG_DIR"
          cp -r "dist/PAE Control.app" "$DMG_DIR/"
          ln -s /Applications "$DMG_DIR/Applications"
          hdiutil create -volname "PAE Control" -srcfolder "$DMG_DIR" \
            -ov -format UDZO -o "dist/PAEControl_mac.dmg"
          rm -rf "$DMG_DIR"

      - name: Subir artefacto macOS
        uses: actions/upload-artifact@v4
        with:
          name: PAEControl-macos
          path: |
            dist/PAEControl_mac.zip
            dist/PAEControl_mac.dmg
          retention-days: 90
          if-no-files-found: warn

  # ══════════════════════════════════════════════════════════
  #  PUBLICAR — un solo release "latest" con ambas plataformas
  # ══════════════════════════════════════════════════════════
  publish:
    needs: [build-windows, build-macos]
    if: always() && (needs.build-windows.result == 'success' || needs.build-macos.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-files
          merge-multiple: true

      - name: Publicar Release "latest"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "PAE Control — build más reciente"
          body: |
            Build automático generado desde el commit ${{ github.sha }} en `main`.

            **Windows**
            - `PAEControl.exe` → versión portable, se ejecuta directo sin instalar.
            - `PAEControl_Setup_*.exe` (si está presente) → instalador con acceso directo
              en Escritorio e Inicio. Requiere Windows 10 (64-bit) 1809+.

            **macOS**
            - `PAEControl_mac.dmg` → arrastra a Aplicaciones.
            - `PAEControl_mac.zip` → alternativa si el .dmg no está disponible en esta build.

            Ninguna requiere Python instalado.
          make_latest: true
          fail_on_unmatched_files: false
          files: release-files/*
